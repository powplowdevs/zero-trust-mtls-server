<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-ZTNA Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen text-gray-100">
  <div class="w-full max-w-sm p-8 bg-neutral-900 rounded-2xl shadow-lg border border-neutral-800">
    <h1 class="text-2xl font-semibold text-center mb-6">Zero Trust Portal</h1>
    <form action="/login" method="post" class="space-y-5">
      <div>
        <label class="block text-sm mb-1" for="username">Username</label>
        <input type="text" id="username" name="username" class="w-full px-3 py-2 bg-neutral-800 text-gray-100 rounded-md border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-sm mb-1" for="password">Password</label>
        <input type="password" id="password" name="password" class="w-full px-3 py-2 bg-neutral-800 text-gray-100 rounded-md border border-neutral-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button type="submit" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-md font-medium transition">Login</button>
    </form>
  </div>
</body>
</html>
